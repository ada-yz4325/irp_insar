# ============================================================
# Stage 2 — burst / AOI subset selection
# Declares which swath/bursts to restrict ISCE2 processing to.
# Intentionally small for first validation: one IW swath, the burst(s)
# that overlap the urban AOI, VV polarization only.
#
# This is the input declaration consumed by
# scripts/isce2/cfg_to_stacksentinel_args.py (via configs/isce2/topsStack_template.cfg
# swathNum/bbox fields, which must stay consistent with this file).
# After the stack is built, scripts/isce2/record_burst_subset.py inspects the
# actual reference/IW*/burst_*.xml outputs and writes the *resolved* burst
# count/indices to metadata/resolved_burst_subset.yaml for the record.
# ============================================================

aoi_name: chengdu_urban_core

# Full IW mode — all sub-swaths covering the bbox are used.
# topsStack selects the relevant sub-swaths and bursts automatically.
swath: IW

# Tight AOI clip "south north west east" — Chengdu city centre polygon.
# Path 128, Frame 94. ~62 km E-W × 46 km N-S.
bbox: "30.415 30.8289 103.7625 104.411"

# Polarization for this validation pass
polarization: VV

# Reference scene used by stackSentinel for coregistration (blank = let
# stackSentinel pick the scene closest to the stack's temporal centre)
reference_date: ""
