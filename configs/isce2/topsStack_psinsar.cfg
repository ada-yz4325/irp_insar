# ============================================================
# ISCE2 topsStack config — Beijing PS-InSAR
# Track 47, Descending, Frame 461, 62 scenes 2016-10-03→2018-12-28
# Sequential network (numConnections=3): ~180 pairs, SBAS inversion in MintPy
# ============================================================

[topsStack]

slcDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/slc_beijing_psinsar
demDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/dem_beijing_psinsar
workDir         = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar
orbitDir        = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/orbits
auxDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/aux_cal

# AOI: Beijing urban core (south north west east)
# Frame 461 covers this area in 1–2 bursts per subswath
# Leave swathNum blank — let topsStack select from bbox overlap
swathNum        =
bbox            = 39.80 39.98 116.23 116.52

startBurstIdx   =
stopBurstIdx    =

# Reference scene: leave blank → topsStack picks the temporal midpoint
# After first run, note the chosen masterDate here for reproducibility
masterDate      =

# --- PS-InSAR interferogram network ---
# numConnections=3: sequential 3-connection network (~180 pairs).
# MintPy will use all pairs for SBAS inversion (network.type=sequential).
# NOTE: numConnections=0 was a bug — topsStack interprets it as ZERO pairs.
numConnections  = 3

# --- Processing options ---
numProcess      = 8
useGPU          = False
# ESD: AOI is ~20km N-S; may span 1–2 bursts within a subswath.
# Keep True — if only 1 burst exists, ISCE2 skips ESD gracefully.
doESD           = True
filterStrength  = 0.5       # Goldstein filter [0–1]
unwMethod       = snaphu

# --- SNAPHU ---
snaphuStatCostMode  = DEFO
snaphuInitMethod    = MCF
tiles               = 10 10
