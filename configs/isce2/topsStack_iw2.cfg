# ============================================================
# ISCE2 topsStack config — Beijing IW2-only (Plan B)
# Goal: eliminate IW1/IW3 subswath seam artifacts by processing
# only subswath IW2, which covers the Chaoyang urban core.
#
# IW2 footprint: ~116.12–116.48°E (Chaoyang/Dongcheng/Xicheng)
# Existing 3-swath outputs in isce2_beijing_psinsar are untouched.
# ============================================================

[topsStack]

slcDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/slc_beijing_psinsar
demDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/dem_beijing_psinsar
workDir         = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2
orbitDir        = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/orbits
auxDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/aux_cal

# IW2 only — eliminates all subswath boundary phase offsets
swathNum        = 2

# AOI: Chaoyang urban core, stays within IW2 footprint (116.12–116.48°E)
# bbox format: south north west east
bbox            = 39.65 40.20 116.05 116.52

masterDate      =

# Sequential 3-connection network (~180 pairs for 65 scenes)
numConnections  = 3

numProcess      = 8
useGPU          = False

# IW2 spans multiple bursts in azimuth → ESD can estimate burst-overlap
# azimuth misregistration within the single subswath.
doESD           = True
filterStrength  = 0.5
unwMethod       = snaphu

snaphuStatCostMode  = DEFO
snaphuInitMethod    = MCF
tiles               = 10 10
