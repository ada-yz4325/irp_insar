# ============================================================
# ISCE2 topsStack config — Beijing IW2-only, full 2016-2021 stack
# 120 scenes: 65 (2016-2018) + 55 (2019-2021)
# Same IW2-only strategy as topsStack_iw2.cfg (eliminates IW seams).
# ============================================================

[topsStack]

slcDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/slc_beijing_psinsar
demDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/dem_beijing_psinsar
workDir         = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021
orbitDir        = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/orbits
auxDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/aux_cal

swathNum        = 2

# bbox: south north west east
bbox            = 39.65 40.20 116.05 116.52

masterDate      =

# 5-connection network for 120 scenes (~600 pairs, denser than 3-conn for longer stack)
numConnections  = 5

numProcess      = 8
useGPU          = False

doESD           = True
filterStrength  = 0.5
unwMethod       = snaphu

snaphuStatCostMode  = DEFO
snaphuInitMethod    = MCF
tiles               = 10 10
