# ============================================================
# ISCE2 topsStack configuration template
# Adjust all UPPERCASE values before running
# ============================================================

[topsStack]

# --- Sentinel-1 SLC input directory (one zip per acquisition) ---
# Chengdu dataset kept in a separate directory from the Beijing burst stack.
slcDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/slc_chengdu

# --- DEM ---
demDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/dem_chengdu

# --- Output directory (ISCE2 intermediates are very large, ~2-5x input size) ---
workDir         = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu

# --- Orbit files (POEORB preferred) ---
orbitDir        = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/orbits

# --- Auxiliary calibration files ---
auxDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/aux_cal

# --- Subswath and burst selection ---
# Full city stack: bbox drives sub-swath/burst selection automatically.
# The Chengdu AOI (~62 km E-W, 46 km N-S) spans ~2-3 bursts in azimuth,
# so no swathNum restriction is applied — leave blank to let topsStack
# pick all sub-swaths that overlap the bbox.
swathNum        =

# Tight AOI clip (south north west east) — Chengdu city polygon from ASF.
# Path 128, Frame 94. stackSentinel.py flag: -b/--bbox
bbox            = 30.415 30.8289 103.7625 104.411

# Burst indices: not used by this ISCE2 version's stackSentinel.py CLI
# (no native --burst-index flag exists). AOI/burst restriction is done
# via `bbox` above instead. Kept here for documentation only.
startBurstIdx   =
stopBurstIdx    =

# --- Reference scene (format: YYYYMMDD) ---
# Leave blank to let topsStack choose the scene closest to stack centre
masterDate      =

# --- Network configuration ---
# 19-scene sparse stack (2015-2017): numConnections=3 keeps the SBAS
# network tight (short temporal baselines) without wasting pairs on
# long-gap connections that likely decorrelate anyway.
numConnections  = 3

# --- Processing options ---
numProcess      = 8        # parallel processes
useGPU          = False
# ESD enabled: the Chengdu AOI spans ~2-3 bursts per sub-swath, so
# burst-overlap interferograms exist and ESD can estimate azimuth
# misregistration. (Unlike the single-burst Beijing stack where ESD
# was disabled because there were no adjacent bursts to overlap.)
doESD           = True     # Enhanced Spectral Diversity coregistration
filterStrength  = 0.5      # Goldstein filter strength [0–1]
unwMethod       = snaphu   # snaphu | icu

# --- SNAPHU unwrapping ---
snaphuStatCostMode  = DEFO      # DEFO | SMOOTH | TOPO
snaphuInitMethod    = MCF       # MCF | MST
tiles               = 10 10     # rows cols of tiles for parallel unwrapping
