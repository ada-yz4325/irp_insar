# ============================================================
# ISCE2 topsStack config — Himalaya / Everest (Qomolangma) region
# Track 19, Frame 497, Descending, 187 scenes, 2020-03-21 -> 2026-06 (latest)
#
# Unlike the Beijing stacks, this AOI genuinely needs TWO subswaths:
# verified via annotation-XML inspection of one sample scene (2026-07-11):
#   IW1: 84.93-86.07E  -- barely touches the AOI's eastern edge, skip
#   IW2: 84.04-85.23E  -- covers ~73% of AOI (east side)
#   IW3: 83.29-84.37E  -- covers ~67% of AOI (west side)
#   IW2+IW3 together : 83.29-85.23E -- fully contains the AOI (83.70-84.95E)
# UPDATE 2026-07-12: swathNum was originally left blank (auto-select).
# topsStack then also pulled in IW1, whose overlap with the AOI is a mere
# 0.02deg sliver at the eastern edge (84.931-84.9545E vs AOI max 84.9545E)
# -- redundant, since IW2 alone already reaches 85.225E, well past the
# AOI. That marginal inclusion caused a real failure: for the most recent
# date (20260625), IW1 produced no valid overlap burst data at all,
# crashing run_08_timeseries_misreg with FileNotFoundError/IndexError
# after ~3h48m. Fixed by explicitly restricting to swathNum = 2 3.
# ============================================================

[topsStack]

slcDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/slc_himalaya_everest
demDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/dem_himalaya_everest
workDir         = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest
orbitDir        = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/orbits
auxDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/aux_cal

# Explicit, not blank -- see UPDATE note above. IW2+IW3 alone fully cover
# the AOI (83.29-85.23E vs AOI 83.70-84.95E); IW1 excluded.
swathNum        = 2 3

# bbox: south north west east -- the AOI itself, no extra padding needed
# (DEM was downloaded with padding already: 28.10 29.10 83.60 85.05)
bbox            = 28.2255 29.0051 83.6967 84.9545

masterDate      =

# 3-connection sequential network (~550 pairs from 187 scenes) -- kept
# lighter than Beijing's 5-connection choice for this first Himalaya run,
# since multi-swath processing per scene costs ~3x a single-swath scene
# and this terrain's decorrelation behavior is untested territory.
numConnections  = 3

numProcess      = 8
useGPU          = False

# ESD: multi-swath, matters more here than in a single-swath stack
doESD           = True
filterStrength  = 0.5
unwMethod       = snaphu

snaphuStatCostMode  = DEFO
snaphuInitMethod    = MCF
tiles               = 10 10
