# ============================================================
# ISCE2 topsStack configuration template
# Adjust all UPPERCASE values before running
# ============================================================

[topsStack]

# --- Sentinel-1 SLC input directory (one zip per acquisition) ---
# All large data goes to ephemeral (no quota, but deleted after 30 days)
slcDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/slc

# --- DEM ---
demDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/dem

# --- Output directory (ISCE2 intermediates are very large, ~2-5x input size) ---
workDir         = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2

# --- Orbit files (POEORB preferred) ---
orbitDir        = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/orbits

# --- Auxiliary calibration files ---
auxDir          = /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/aux_cal

# --- Subswath and burst selection ---
# Urban PS validation stack: single swath, single burst by design
# (verified: AOI only overlaps IW1, see configs/dataset.yaml /
# configs/burst_subset.yaml). Comma-separated list also accepted.
swathNum        = 1

# Optional tight AOI clip: "south north west east" (decimal degrees).
# Leave blank to use the common overlap between all scenes in the stack
# (this is what produced the single IW1/burst_01 footprint previously).
# stackSentinel.py flag: -b/--bbox
bbox            =

# Burst indices: not used by this ISCE2 version's stackSentinel.py CLI
# (no native --burst-index flag exists). AOI/burst restriction is done
# via `bbox` above instead. Kept here for documentation only.
startBurstIdx   =
stopBurstIdx    =

# --- Reference scene (format: YYYYMMDD) ---
# Leave blank to let topsStack choose the scene closest to stack centre
masterDate      =

# --- Network configuration ---
# Number of connections per acquisition in the SBAS network.
# Bumped from 3 to 5 for the 57-scene urban PS stack: a denser network
# gives more independent coherence/phase observations per pixel, which
# improves the temporal-coherence statistics the PS-like mask relies on.
numConnections  = 5

# --- Processing options ---
numProcess      = 8        # parallel processes
useGPU          = False
# Enhanced Spectral Diversity (NESD) coregistration needs burst-overlap
# interferograms (the shared azimuth strip between adjacent bursts in the
# same swath) to estimate azimuth misregistration. This stack has exactly
# 1 burst per swath by design (see swathNum above) -- there is no second
# burst to overlap with, so NESD always fails with an empty pair list in
# run_07/08 (confirmed: job 3126363.pbs-7, IndexError in invertMisreg.py).
# Must use plain geometry coregistration for single-burst stacks; only
# re-enable ESD if/when scaling to an AOI spanning 2+ bursts per swath.
doESD           = False    # Enhanced Spectral Diversity coregistration
filterStrength  = 0.5      # Goldstein filter strength [0–1]
unwMethod       = snaphu   # snaphu | icu

# --- SNAPHU unwrapping ---
snaphuStatCostMode  = DEFO      # DEFO | SMOOTH | TOPO
snaphuInitMethod    = MCF       # MCF | MST
tiles               = 10 10     # rows cols of tiles for parallel unwrapping
