# ============================================================
# ISCE2 topsStack configuration template
# Adjust all UPPERCASE values before running
# ============================================================

[topsStack]

# --- Sentinel-1 SLC input directory (one zip per acquisition) ---
slcDir          = /path/to/data/raw/slc

# --- DEM ---
demDir          = /path/to/data/raw/dem

# --- Output directory ---
workDir         = /path/to/data/processed/isce2

# --- Orbit files (POEORB preferred) ---
orbitDir        = /path/to/data/raw/orbits

# --- Auxiliary calibration files ---
auxDir          = /path/to/data/raw/aux_cal

# --- Subswath and burst selection ---
# IW1, IW2, or IW3 — or comma-separated list
swathNum        = 1,2,3

# Burst indices: leave blank to use all bursts in swath
startBurstIdx   =
stopBurstIdx    =

# --- Reference scene (format: YYYYMMDD) ---
# Leave blank to let topsStack choose the scene closest to stack centre
masterDate      =

# --- Network configuration ---
# Number of connections per acquisition in the SBAS network
numConnections  = 3

# --- Processing options ---
numProcess      = 8        # parallel processes
useGPU          = False
doESD           = True     # Enhanced Spectral Diversity coregistration
filterStrength  = 0.5      # Goldstein filter strength [0–1]
unwMethod       = snaphu   # snaphu | icu

# --- SNAPHU unwrapping ---
snaphuStatCostMode  = DEFO      # DEFO | SMOOTH | TOPO
snaphuInitMethod    = MCF       # MCF | MST
tiles               = 10 10     # rows cols of tiles for parallel unwrapping
