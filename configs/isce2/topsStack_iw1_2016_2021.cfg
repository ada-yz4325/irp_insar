# ============================================================
# ISCE2 topsStack config — Beijing IW1, full 2016-2021 stack
# Same SLCs as topsStack_iw2_2016_2021.cfg (track 47, descending, frame 461,
# already downloaded — no new ASF search needed), different subswath.
#
# IW1 native footprint (measured from annotation GCPs of this stack's SLCs,
# 2026-07-09): ~116.1-117.5°E, ~38.4-40.1°N — this covers Chaoyang core,
# Tongzhou (TZSC subsidence bowl), Daxing, and Capital Airport (BCIA), i.e.
# the actual hotspots reported in Zhou et al. 2024 Figure 5/8. It does NOT
# reach the Mi-Huai-Shun rebound zone (~40.2-40.35°N) — that needs an
# adjacent frame further north along the same track, a separate ASF search.
#
# bbox below is deliberately inset from IW1's full native range so
# stackSentinel snaps cleanly to burst boundaries well inside the swath.
# ============================================================

[topsStack]

slcDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/slc_beijing_psinsar
demDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/dem_beijing_psinsar
workDir         = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021
orbitDir        = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/orbits
auxDir          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/raw/aux_cal

swathNum        = 1

# bbox: south north west east — Chaoyang/Tongzhou/Daxing/BCIA core
bbox            = 39.65 40.10 116.10 117.00

masterDate      =

# Same 5-connection sequential network as the IW2 2016-2021 stack (120 scenes)
numConnections  = 5

numProcess      = 8
useGPU          = False

doESD           = True
filterStrength  = 0.5
unwMethod       = snaphu

snaphuStatCostMode  = DEFO
snaphuInitMethod    = MCF
tiles               = 10 10
