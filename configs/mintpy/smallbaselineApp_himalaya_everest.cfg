# ============================================================
# MintPy config — Himalaya / Everest (Qomolangma) region
# Track 19, Frame 497, Descending, IW2+IW3, 186 scenes, 2020-03-21 -> 2026-06.
# Mirrors smallbaselineApp_iw1_2016_2021.cfg (Beijing IW1); same corrections
# stack applied from the start this time (no trial-and-error needed):
#   - unwrapError.method = bridging+phase_closure, set before the first run
#     (Beijing discovered this the hard way after invert_network crashed
#     without it -- see run_mintpy.sh comment, job 3128109.pbs-7)
#   - troposphericDelay.method = no here; ERA5/PyAPS3 correction is applied
#     externally as pluggable Stage 11 (atmospheric_correction/
#     apply_atmo_correction.py), same architecture as Beijing.
#   - reference.lalo is intentionally left BLANK below. Beijing needed 4
#     attempts to find a valid point (naive auto-pick, paper's coordinate,
#     coherence-argmax alone all failed) before landing on the working
#     method: intersect maskConnComp (pixel connected in ALL interferograms)
#     with avgSpatialCoh argmax. For this run that intersection is computed
#     proactively right after load_data + quick_overview, BEFORE the first
#     reference_point attempt, and the resulting coordinate gets filled in
#     here before continuing the pipeline.
# ============================================================

[topsStack]

mintpy.load.processor        = isce

mintpy.load.metaFile         = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/reference/IW2.xml

mintpy.load.unwFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/interferograms/*/filt_*.unw
mintpy.load.corFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/interferograms/*/filt_*.cor
mintpy.load.connCompFile     = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/interferograms/*/filt_*.unw.conncomp
mintpy.load.intFile          = None
mintpy.load.demFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/geom_reference/hgt.rdr
mintpy.load.lookupYFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/geom_reference/lat.rdr
mintpy.load.lookupXFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/geom_reference/lon.rdr
mintpy.load.incAngleFile     = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/geom_reference/los.rdr
mintpy.load.azAngleFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/geom_reference/los.rdr
mintpy.load.shadowMaskFile   = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/merged/geom_reference/shadowMask.rdr
mintpy.load.waterMaskFile    = None
mintpy.load.baselineDir      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_himalaya_everest/baselines

mintpy.network.type          = sequential
mintpy.network.connNum       = 3

mintpy.networkInversion.weightFunc      = no
mintpy.networkInversion.minCoherence    = 0.0
mintpy.networkInversion.minTempCoh      = 0.72

mintpy.troposphericDelay.method         = no
mintpy.troposphericDelay.weatherModel   = ERA5

mintpy.unwrapError.method               = bridging+phase_closure

# Picked via scripts/mintpy/pick_reference_point.py: intersection of
# maskConnComp.h5 (connected in ALL 552 interferograms -- only 6.90% of
# pixels qualify, comparable to Beijing IW1's ~4.8%) and avgSpatialCoh.h5
# argmax, restricted to the AOI sub-box (unrestricted argmax landed at
# 29.07,85.11 -- outside the AOI, past IW2's eastern edge). Bare rock at
# 5065m elevation, 40.55deg incidence, coherence 0.9963.
mintpy.reference.lalo                   = 29.00467, 84.60551

mintpy.deramp.surfaceType               = linear
mintpy.deramp.maskFile                  = maskTempCoh.h5

mintpy.save.hdfEos5                     = no
