# ============================================================
# MintPy smallbaselineApp configuration template
# Reference: https://mintpy.readthedocs.io/en/latest/
# ============================================================

# Input files come from ISCE2 output in ephemeral
mintpy.load.processor        = isce          # isce | hyp3 | gamma | roipac
# MintPy's "auto" only resolves metaFile for project layouts it recognizes
# from auto_path.py's templates -- our flat ephemeral path doesn't match,
# so it stays the literal string "auto" and load_data.py fails with
# "No input metadata file found: auto" -> downstream KeyError on
# STARTING_RANGE (confirmed live: job 3127850.pbs-7). Set explicitly.
mintpy.load.metaFile          = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/reference/IW2.xml
mintpy.load.unwFile          = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/interferograms/*/filt_*.unw
mintpy.load.corFile          = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/interferograms/*/filt_*.cor
mintpy.load.connCompFile     = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/interferograms/*/filt_*.unw.conncomp
mintpy.load.intFile          = None
mintpy.load.demFile          = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/geom_reference/hgt.rdr
mintpy.load.lookupYFile      = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/geom_reference/lat.rdr
mintpy.load.lookupXFile      = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/geom_reference/lon.rdr
mintpy.load.incAngleFile     = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/geom_reference/los.rdr
mintpy.load.azAngleFile      = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/geom_reference/los.rdr
mintpy.load.shadowMaskFile   = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/merged/geom_reference/shadowMask.rdr
mintpy.load.waterMaskFile    = None
# "bperpFile" is not a real MintPy ISCE-tops option (auto_path.py's actual
# key is baselineDir, pointing at the directory of per-pair baseline .txt
# files -- our on-disk layout is baselines/<pair>/<pair>.txt, not a single
# binary "bperp" file). The old bperpFile key was silently ignored.
mintpy.load.baselineDir      = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_chengdu/baselines

# --- Coherence-based masking ---
mintpy.networkInversion.minCoherence    = 0.7
mintpy.networkInversion.weightFunc      = var    # var | uniform | fim

# --- Tropospheric correction ---
# Set to "no": handled externally and explicitly by
# atmospheric_correction/apply_atmo_correction.py (Stage 11) instead, per
# configs/atmo_correction.yaml -- run_mintpy.sh no longer calls MintPy's
# own correct_troposphere dostep. Keep this "no" so a stray direct
# `--dostep correct_troposphere` invocation can't silently double-correct.
mintpy.troposphericDelay.method         = no    # pyaps | gacos | no
mintpy.troposphericDelay.weatherModel   = ERA5

# --- Phase unwrapping error correction ---
mintpy.unwrapError.method               = bridging+phase_closure

# --- Reference point ---
mintpy.reference.lalo                   = auto   # lat,lon or auto

# --- Temporal coherence threshold for velocity mask ---
mintpy.networkInversion.minTempCoh      = 0.7

# --- Output ---
mintpy.save.hdfEos5                     = no
