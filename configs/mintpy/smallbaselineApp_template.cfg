# ============================================================
# MintPy smallbaselineApp configuration template
# Reference: https://mintpy.readthedocs.io/en/latest/
# ============================================================

mintpy.load.processor        = isce          # isce | hyp3 | gamma | roipac
mintpy.load.unwFile          = ../isce2/merged/interferograms/*/filt_*.unw
mintpy.load.corFile          = ../isce2/merged/interferograms/*/filt_*.cor
mintpy.load.connCompFile     = ../isce2/merged/interferograms/*/filt_*.unw.conncomp
mintpy.load.intFile          = None
mintpy.load.demFile          = ../isce2/merged/geom_reference/hgt.rdr
mintpy.load.lookupYFile      = ../isce2/merged/geom_reference/lat.rdr
mintpy.load.lookupXFile      = ../isce2/merged/geom_reference/lon.rdr
mintpy.load.incAngleFile     = ../isce2/merged/geom_reference/los.rdr
mintpy.load.azAngleFile      = ../isce2/merged/geom_reference/los.rdr
mintpy.load.shadowMaskFile   = ../isce2/merged/geom_reference/shadowMask.rdr
mintpy.load.waterMaskFile    = None
mintpy.load.bperpFile        = ../isce2/merged/baselines/*/bperp

# --- Coherence-based masking ---
mintpy.networkInversion.minCoherence    = 0.7
mintpy.networkInversion.weightFunc      = var    # var | uniform | fim

# --- Tropospheric correction ---
mintpy.troposphericDelay.method         = pyaps  # pyaps | gacos | no
mintpy.troposphericDelay.weatherModel   = ERA5

# --- Phase unwrapping error correction ---
mintpy.unwrapError.method               = bridging+phase_closure

# --- Reference point ---
mintpy.reference.lalo                   = auto   # lat,lon or auto

# --- Temporal coherence threshold for velocity mask ---
mintpy.networkInversion.minTempCoh      = 0.7

# --- Output ---
mintpy.save.hdfEos5                     = no
