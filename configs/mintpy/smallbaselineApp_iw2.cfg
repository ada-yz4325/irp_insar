# ============================================================
# MintPy config — Beijing IW2-only PS-InSAR (Plan B)
# IW2 single subswath: no seam correction needed.
# Reference paper: Zhou et al. 2024, Remote Sensing 16(9), 1528
# ============================================================

mintpy.load.processor        = isce

mintpy.load.metaFile         = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/reference/IW2.xml

mintpy.load.unwFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/interferograms/*/filt_*.unw
mintpy.load.corFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/interferograms/*/filt_*.cor
mintpy.load.connCompFile     = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/interferograms/*/filt_*.unw.conncomp
mintpy.load.intFile          = None
mintpy.load.demFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/geom_reference/hgt.rdr
mintpy.load.lookupYFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/geom_reference/lat.rdr
mintpy.load.lookupXFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/geom_reference/lon.rdr
mintpy.load.incAngleFile     = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/geom_reference/los.rdr
mintpy.load.azAngleFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/geom_reference/los.rdr
mintpy.load.shadowMaskFile   = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/merged/geom_reference/shadowMask.rdr
mintpy.load.waterMaskFile    = None
mintpy.load.baselineDir      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2/baselines

mintpy.network.type          = sequential
mintpy.network.connNum       = 3

mintpy.networkInversion.weightFunc      = no
mintpy.networkInversion.minCoherence    = 0.0
mintpy.networkInversion.minTempCoh      = 0.72

mintpy.troposphericDelay.method         = no
mintpy.troposphericDelay.weatherModel   = ERA5

mintpy.unwrapError.method               = bridging+phase_closure

# IW2 valid coverage confirmed: lat 39.33–40.06°N, lon 115.41–116.51°E.
# Mentougou (116.05°E) and (40.12, 116.20) both outside valid area.
# Ref: northern fringe near airport, coh=0.94, confirmed valid in maskConnComp.
mintpy.reference.lalo                   = 40.0040,116.5128

mintpy.deramp.surfaceType               = linear
mintpy.deramp.maskFile                  = maskTempCoh.h5

mintpy.save.hdfEos5                     = no
