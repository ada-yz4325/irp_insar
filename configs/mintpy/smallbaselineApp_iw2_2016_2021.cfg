# ============================================================
# MintPy config — Beijing IW2-only, full 2016-2021 stack (120 scenes)
# Three sub-period velocities via timeseries2velocity.py:
#   Period A: 2016-10-03 → 2019-12-31
#   Period B: 2020-01-01 → 2021-11-30
#   Period C: 2016-10-03 → 2021-11-30 (full)
# ============================================================

mintpy.load.processor        = isce

mintpy.load.metaFile         = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/reference/IW2.xml

mintpy.load.unwFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/interferograms/*/filt_*.unw
mintpy.load.corFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/interferograms/*/filt_*.cor
mintpy.load.connCompFile     = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/interferograms/*/filt_*.unw.conncomp
mintpy.load.intFile          = None
mintpy.load.demFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/geom_reference/hgt.rdr
mintpy.load.lookupYFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/geom_reference/lat.rdr
mintpy.load.lookupXFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/geom_reference/lon.rdr
mintpy.load.incAngleFile     = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/geom_reference/los.rdr
mintpy.load.azAngleFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/geom_reference/los.rdr
mintpy.load.shadowMaskFile   = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/merged/geom_reference/shadowMask.rdr
mintpy.load.waterMaskFile    = None
mintpy.load.baselineDir      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw2_2016_2021/baselines

mintpy.network.type          = sequential
mintpy.network.connNum       = 5

mintpy.networkInversion.weightFunc      = no
mintpy.networkInversion.minCoherence    = 0.0
mintpy.networkInversion.minTempCoh      = 0.72

mintpy.troposphericDelay.method         = no

mintpy.unwrapError.method               = no

# Auto-select: airport area masked out in 5-year stack (heavy subsidence → poor unwrap).
# Absolute offset corrected post-hoc by bedrock secondary reference in export script.
mintpy.reference.lalo                   = auto

mintpy.deramp.surfaceType               = linear
mintpy.deramp.maskFile                  = maskTempCoh.h5

mintpy.save.hdfEos5                     = no
