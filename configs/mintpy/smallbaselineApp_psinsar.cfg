# ============================================================
# MintPy config — Beijing PS-InSAR
# Star network + equal-weight inversion + paper-matched PS thresholds
# Reference paper: Zhou et al. 2024, Remote Sensing 16(9), 1528
# PS selection: ADI ≤ 0.56 (compute_adi_psinsar.py) AND temporalCoherence ≥ 0.72
# ============================================================

mintpy.load.processor        = isce

# metaFile: set to the IW xml of the subswath covering the AOI.
# Verify the correct IW number after ISCE2 completes:
#   ls data/processed/isce2_beijing_psinsar/reference/IW*.xml
mintpy.load.metaFile         = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/reference/IW2.xml

mintpy.load.unwFile          = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/interferograms/*/filt_*.unw
mintpy.load.corFile          = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/interferograms/*/filt_*.cor
mintpy.load.connCompFile     = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/interferograms/*/filt_*.unw.conncomp
mintpy.load.intFile          = None
mintpy.load.demFile          = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/geom_reference/hgt.rdr
mintpy.load.lookupYFile      = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/geom_reference/lat.rdr
mintpy.load.lookupXFile      = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/geom_reference/lon.rdr
mintpy.load.incAngleFile     = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/geom_reference/los.rdr
mintpy.load.azAngleFile      = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/geom_reference/los.rdr
mintpy.load.shadowMaskFile   = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/merged/geom_reference/shadowMask.rdr
mintpy.load.waterMaskFile    = None
mintpy.load.baselineDir      = /rds/general/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_psinsar/baselines

# --- PS-InSAR: star network ---
mintpy.network.type          = star   # star = all pairs share one reference date

# --- PS-InSAR: equal-weight inversion ---
# PS points are pre-screened stable scatterers; coherence weighting is not needed
mintpy.networkInversion.weightFunc      = no     # no | var | fim
mintpy.networkInversion.minCoherence    = 0.0    # no coherence cutoff at inversion stage
                                                 # PS selection done by build_ps_mask_psinsar.py

# --- Temporal coherence threshold ---
# Matches paper ACC ≥ 0.72; used by build_ps_mask_psinsar.py
mintpy.networkInversion.minTempCoh      = 0.72

# --- Tropospheric correction ---
mintpy.troposphericDelay.method         = no     # ERA5 applied externally via apply_atmo_correction.py
mintpy.troposphericDelay.weatherModel   = ERA5

# --- Unwrapping error correction ---
mintpy.unwrapError.method               = bridging+phase_closure

# --- Reference point (Tiananmen Square — matches paper) ---
mintpy.reference.lalo                   = 39.9054,116.3976

# --- Output ---
mintpy.save.hdfEos5                     = no
