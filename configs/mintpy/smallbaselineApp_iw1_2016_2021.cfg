# ============================================================
# MintPy config — Beijing IW1, full 2016-2021 stack (Chaoyang/Tongzhou/
# Daxing/BCIA — the actual hotspot region from Zhou et al. 2024 Fig. 5/8)
# Mirrors smallbaselineApp_iw2_2016_2021.cfg; paths point at the IW1 stack.
# Run with scripts/mintpy/run_mintpy_psinsar.sh (ADI+TC dual-condition PS
# mask, matches the paper's PS criterion) — same chain as the IW2 run.
# ============================================================

mintpy.load.processor        = isce

mintpy.load.metaFile         = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/reference/IW1.xml

mintpy.load.unwFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/interferograms/*/filt_*.unw
mintpy.load.corFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/interferograms/*/filt_*.cor
mintpy.load.connCompFile     = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/interferograms/*/filt_*.unw.conncomp
mintpy.load.intFile          = None
mintpy.load.demFile          = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/geom_reference/hgt.rdr
mintpy.load.lookupYFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/geom_reference/lat.rdr
mintpy.load.lookupXFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/geom_reference/lon.rdr
mintpy.load.incAngleFile     = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/geom_reference/los.rdr
mintpy.load.azAngleFile      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/geom_reference/los.rdr
mintpy.load.shadowMaskFile   = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/merged/geom_reference/shadowMask.rdr
mintpy.load.waterMaskFile    = None
mintpy.load.baselineDir      = /rds/general/ephemeral/user/yz4325/ephemeral/irp_insar/data/processed/isce2_beijing_iw1_2016_2021/baselines

mintpy.network.type          = sequential
mintpy.network.connNum       = 5

mintpy.networkInversion.weightFunc      = no
mintpy.networkInversion.minCoherence    = 0.0
mintpy.networkInversion.minTempCoh      = 0.72

mintpy.troposphericDelay.method         = no
mintpy.troposphericDelay.weatherModel   = ERA5

mintpy.unwrapError.method               = bridging+phase_closure

# First pass used auto (REF_Y=1072,REF_X=337) -> fell in a region with
# severe unwrapping-error problems, bridging crashed ("reference point is
# NOT included in the connectComponent"). Second attempt used the paper's
# Tiananmen point (39.9054,116.3976) -> that coordinate has no match in
# this stack's radar-geometry lookup table (right at the ragged edge of
# valid coverage for this particular burst/bbox selection, even though
# it's inside the nominal geocoded bounding box).
# Third attempt: picked from geo_avgSpatialCoh.h5 argmax within a safe
# sub-box -> failed too ("in masked OUT area defined by maskConnComp.h5"):
# high average coherence does NOT guarantee connectComponent!=0 in every
# single one of the 570 interferograms (maskConnComp.h5 requires nonzero
# in ALL pairs -- only ~4.8% of pixels in this stack qualify, consistent
# with how widespread the unwrapping-error problem is across this AOI).
# Fourth attempt (current): picked from the intersection of maskConnComp
# (radar coords, guaranteed always-connected) AND avgSpatialCoh (argmax
# among qualifying pixels) -- coherence 0.981, verified to satisfy both
# of reference_point.py's actual checks.
mintpy.reference.lalo                   = 39.82087, 116.50944

mintpy.deramp.surfaceType               = linear
mintpy.deramp.maskFile                  = maskTempCoh.h5

mintpy.save.hdfEos5                     = no
