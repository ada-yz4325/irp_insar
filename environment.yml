name: insar
channels:
  - conda-forge
  - nodefaults

dependencies:
  # Core scientific stack
  - python=3.10
  - numpy
  - scipy
  - matplotlib
  - pandas
  - xarray
  - netcdf4
  - h5py
  - gdal
  - rasterio
  - pyproj
  - shapely
  - geopandas

  # Jupyter
  - jupyterlab
  - ipywidgets
  - ipympl

  # InSAR / remote sensing
  - mintpy          # time-series InSAR analysis
  - isce2           # SAR interferometry engine (conda-forge)
  - snaphu          # phase unwrapping

  # Data download
  - sentinelsat     # Copernicus Open Access Hub API

  # Time-series / forecasting
  - statsmodels     # ARIMA
  - scikit-learn
  - pytorch         # LSTM + Transformer
  - pytorch-lightning

  # Utilities
  - tqdm
  - pyyaml
  - click
  - pip

  - pip:
      - aria2p       # fast parallel download manager
      - asf-search   # Alaska Satellite Facility search API
      - sentineleof  # Sentinel-1 precise orbit file downloader (uses ASF/EarthData auth)
