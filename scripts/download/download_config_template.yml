# Sentinel-1 SLC download configuration
# Copy to download_config.yml (gitignored), fill in your values

# --- Study area (WKT polygon) ---
# Get the exact WKT from ASF Vertex: draw your AOI → "Area of Interest" → copy WKT
# Example below covers a central Himalayan region (Nepal/Tibet border)
aoi: "POLYGON((85.0 27.5, 87.0 27.5, 87.0 29.0, 85.0 29.0, 85.0 27.5))"

# --- Date range ---
start: "2018-01-01"
end:   "2023-12-31"

# --- Sentinel-1 track and frame ---
# Find via ASF Vertex: search your AOI → "Path and Frame Filters"
# Path = relative orbit number, Frame = frame number
track: 85
frame: 94

# --- Orbit direction ---
pass_dir: ASCENDING   # ASCENDING | DESCENDING

# --- Polarization ---
polarization: VV+VH   # VV+VH | VV | VH

# --- Output directory ---
# IMPORTANT: SLC data is large (4GB/scene × 30-80 scenes = 120-320GB)
# Must use ephemeral storage — home has only 1TB quota
# Ephemeral files are auto-deleted 30 days after creation
out_dir: /rds/general/user/yz4325/ephemeral/irp_insar/data/raw/slc

# --- Max scenes to return ---
max_results: 300

# NOTE: Authentication uses ~/.netrc automatically (no credentials needed here)
# Ensure ~/.netrc contains:
#   machine urs.earthdata.nasa.gov
#       login YOUR_USERNAME
#       password YOUR_PASSWORD
